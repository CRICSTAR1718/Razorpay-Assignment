<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reimbursements - Vanilla JS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Reimbursements Portal</h1>
        <p class="muted">Vanilla JS frontend for the existing Express API</p>
      </div>
      <div class="topbar-actions">
        <button id="btnLogout" class="btn btn-secondary" hidden>Logout</button>
      </div>
    </header>

    <section class="card" id="authCard">
      <h2>Login / Register</h2>
      <div class="grid">
        <div>
          <h3>Login</h3>
          <form id="loginForm" class="form">
            <label>
              Email
              <input name="email" type="email" required autocomplete="email" />
            </label>
            <label>
              Password
              <input name="password" type="password" required autocomplete="current-password" />
            </label>
            <button class="btn btn-primary" type="submit">Login</button>
          </form>
        </div>

        <div>
          <h3>Register</h3>
          <form id="registerForm" class="form">
            <label>
              Name
              <input name="name" type="text" required autocomplete="name" />
            </label>
            <label>
              Email
              <input name="email" type="email" required autocomplete="email" />
            </label>
            <label>
              Password
              <input name="password" type="password" required autocomplete="new-password" />
            </label>
            <button class="btn btn-primary" type="submit">Register</button>
          </form>
        </div>
      </div>

      <div id="authMessage" class="message" role="status" aria-live="polite"></div>
    </section>

    <section class="card" id="mainCard" hidden>
      <div class="row">
        <div>
          <h2>Dashboard</h2>
          <p class="muted" id="userSummary"></p>
        </div>
        <div class="row-actions">
          <button class="btn" id="btnRefresh">Refresh</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab" data-tab="tabCreate">Create reimbursement</button>
        <button class="tab" data-tab="tabList">My reimbursements</button>
        <button class="tab" data-tab="tabApprove" id="tabApproveBtn">Approve/Reject</button>
      </div>

      <div class="tab-panels">
        <div class="panel" id="tabCreate">
          <h3>Create reimbursement</h3>
          <form id="createForm" class="form">
            <label>
              Title
              <input name="title" type="text" required />
            </label>
            <label>
              Description
              <textarea name="description" rows="4" required></textarea>
            </label>
            <label>
              Amount
              <input name="amount" type="number" min="0" step="0.01" required />
            </label>
            <button class="btn btn-primary" type="submit">Submit</button>
          </form>
        </div>

        <div class="panel" id="tabList">
          <h3>My reimbursements</h3>
          <div class="panel-toolbar">
            <label class="inline">
              Target userId (optional for RM/APE/CFO)
              <input id="targetUserId" type="text" placeholder="e.g. 1" />
            </label>
            <button class="btn" id="btnLoadForUser">Load for user</button>
          </div>

          <div id="reimbursementsMessage" class="message" role="status" aria-live="polite"></div>
          <table class="table" id="reimbursementsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>

        <div class="panel" id="tabApprove">
          <h3>Approve / Reject</h3>
          <p class="muted">Select a reimbursement and choose action.</p>
          <div id="approveMessage" class="message" role="status" aria-live="polite"></div>
          <div class="approve-grid" id="approveGrid"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
